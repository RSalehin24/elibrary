<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="bn">
  <head>
    <meta charset="UTF-8" />
    <title>কভার</title>
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0d1117;
      }
      .cover {
        background: linear-gradient(
          160deg,
          #0d1117 0%,
          #1a1a2e 50%,
          #16213e 100%
        );
        min-height: 100%;
        display: -webkit-box;
        display: flex;
        -webkit-box-orient: vertical;
        -webkit-box-direction: normal;
        flex-direction: column;
        -webkit-box-align: center;
        align-items: center;
        -webkit-box-pack: center;
        justify-content: center;
        padding: 60px 40px;
        font-family:
          "Kalpurush", "SolaimanLipi", "Noto Sans Bengali", Arial, sans-serif;
        color: #e8eaf0;
        text-align: center;
      }
      .accent-bar-top {
        width: 64px;
        height: 3px;
        background: #5c6bc0;
        margin-bottom: 48px;
        border-radius: 2px;
      }
      .title {
        font-size: 2em;
        font-weight: bold;
        color: #f0f2f8;
        line-height: 1.55;
        letter-spacing: 0.03em;
        margin-bottom: 12px;
        max-width: 480px;
      }
      .series {
        font-size: 0.95em;
        color: #8fa0cc;
        margin-bottom: 28px;
        letter-spacing: 0.04em;
      }
      .divider {
        width: 80px;
        height: 1px;
        background: #3d4a7a;
        margin: 28px auto;
      }
      .author {
        font-size: 1.15em;
        color: #a0b0d8;
        letter-spacing: 0.04em;
      }
      .accent-bar-bottom {
        width: 64px;
        height: 3px;
        background: #5c6bc0;
        margin-top: 48px;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="cover">
      <div class="accent-bar-top" />
      <div class="title">{{ book_title }}</div>
      {% if series %}
      <div class="series">{{ series }}</div>
      {% endif %}
      <div class="divider" />
      <div class="author">{{ author }}</div>
      <div class="accent-bar-bottom" />
    </div>
  </body>
</html>
