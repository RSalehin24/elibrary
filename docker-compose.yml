services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bangla_library}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/bangla_library}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python manage.py seed_superadmin &&
      exec gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-120} --access-logfile - --error-logfile -"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/storage/media
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/csrf/', timeout=5)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      - postgres
      - redis
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - public
      - internal

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/bangla_library}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: celery -A config worker --loglevel=info
    volumes:
      - media_data:/app/storage/media
    depends_on:
      - postgres
      - redis
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - public
      - internal

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/bangla_library}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: celery -A config beat --loglevel=info
    volumes:
      - media_data:/app/storage/media
    depends_on:
      - postgres
      - redis
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - public
      - internal

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    env_file:
      - .env
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-}
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-}
      SSL_ENABLED: ${SSL_ENABLED:-1}
    volumes:
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
      - internal

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    command: >
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet --no-random-sleep-on-renew;
      sleep 12h & wait $${!};
      done"
    networks:
      - public

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  certbot_www:
  letsencrypt:

networks:
  public:
  internal:
    internal: true
