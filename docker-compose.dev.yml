services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: development
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:${BACKEND_PORT:-8000}}
      PUBLIC_API_ORIGIN: ${PUBLIC_API_ORIGIN:-http://127.0.0.1:${BACKEND_PORT:-8000}}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1:${FRONTEND_PORT:-5173}}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000}
    command: >
      sh -c "python manage.py migrate &&
      python manage.py seed_superadmin &&
      exec python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: development
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:${BACKEND_PORT:-8000}}
      PUBLIC_API_ORIGIN: ${PUBLIC_API_ORIGIN:-http://127.0.0.1:${BACKEND_PORT:-8000}}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1:${FRONTEND_PORT:-5173}}
    command: >
      python scripts/run_with_watch.py
      --watch-dir /app/apps
      --watch-dir /app/config
      --cwd /app
      --
      celery -A config worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: development
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:${BACKEND_PORT:-8000}}
      PUBLIC_API_ORIGIN: ${PUBLIC_API_ORIGIN:-http://127.0.0.1:${BACKEND_PORT:-8000}}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1:${FRONTEND_PORT:-5173}}
    command: >
      python scripts/run_with_watch.py
      --watch-dir /app/apps
      --watch-dir /app/config
      --cwd /app
      --
      celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_DEV_PROXY_TARGET: http://backend:8000
    command: npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - public

volumes:
  frontend_node_modules:
